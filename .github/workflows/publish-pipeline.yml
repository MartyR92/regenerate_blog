name: PydanticAI Publish Pipeline

on:
  schedule:
    - cron: '0 3 */2 * *' # 3:00 AM GMT every 2nd day
  push:
    paths:
      - '_drafts/**'
    branches:
      - main
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic for the orchestrator to process'
        required: false
        default: 'The future of regenerative agritech'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  orchestrate-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PydanticAI Orchestrator (Publish Mode)
        env:
          INCEPTION_API_KEY: ${{ secrets.INCEPTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          OPENROUTER_API_KEY_1: ${{ secrets.OPENROUTER_API_KEY_1 }}
          OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
          OPENROUTER_API_KEY_3: ${{ secrets.OPENROUTER_API_KEY_3 }}
          OPENROUTER_API_KEY_4: ${{ secrets.OPENROUTER_API_KEY_4 }}
          OPENROUTER_API_KEY_5: ${{ secrets.OPENROUTER_API_KEY_5 }}
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            python scripts/orchestrator.py --publish --topic "${{ github.event.inputs.topic }}"
          else
            python scripts/orchestrator.py --publish
          fi

      - name: Move Drafts to Content
        run: |
          python -c '
          import os, glob, yaml, shutil
          drafts = glob.glob("_drafts/*.md")
          for draft in drafts:
              with open(draft, "r", encoding="utf-8") as f:
                  content = f.read()

              fm_str = content.split("---")[1] if "---" in content else ""
              try: fm = yaml.safe_load(fm_str) or {}
              except: fm = {}
              lang = fm.get("language", "de")
              dest_dir = f"content/{lang}/posts"
              os.makedirs(dest_dir, exist_ok=True)
              dest_path = os.path.join(dest_dir, os.path.basename(draft))

              with open(draft, "w", encoding="utf-8") as f:
                  f.write(content)

              shutil.move(draft, dest_path)
              print(f"Moved and published {draft} to {dest_path}")
          '

      - name: Commit and Push
        run: |
          git config --global user.name 'Hydra Orchestrator Bot'
          git config --global user.email 'hydra-bot@regenerate-blog.local'
          git add content/ _drafts/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: publish orchestrated post" && git pull --rebase && git push)

      - name: Build Astro Site
        run: npm ci && npm run build

      - name: Validate sitemap.xml
        run: |
          if [ -f dist/sitemap-0.xml ]; then
            echo "Sitemap gefunden. Validierung..."
          else
            echo "Kritischer Fehler: Sitemap fehlt im Build-Output!" && exit 1
          fi

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
