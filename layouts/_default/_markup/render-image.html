{{- $src := .Destination -}}
{{- $isSVG := strings.HasSuffix $src ".svg" -}}
{{- $base := strings.TrimSuffix ".svg" $src -}}
{{- $webp := printf "%s.webp" $base -}}

<figure style="text-align: center;">
  <picture>
    {{- if $isSVG -}}
      <source srcset="{{ $webp | absURL }}" type="image/webp">
    {{- end -}}
    <img src="{{ $src | absURL }}" 
         alt="{{ .Text }}" 
         {{ with .Title }} title="{{ . }}" {{ end }}
         loading="lazy" 
         style="max-width: 100%; height: auto; display: block; margin: 0 auto;">
  </picture>
  {{- with .Title -}}
    <figcaption style="font-style: italic; margin-top: 0.5rem;">
      {{- . | markdownify -}}
    </figcaption>
  {{- end -}}
</figure>
