{{- $src := .Destination -}}
{{- $isSVG := strings.HasSuffix $src ".svg" -}}

{{/* Force site-relative by removing leading slash for relURL */}}
{{- $srcFixed := strings.TrimPrefix "/" $src -}}

<figure style="text-align: center;">
  {{- if $isSVG -}}
    {{/* Just output the SVG directly, no picture/webp slop for now */}}
    <img src="{{ $srcFixed | relURL | safeURL }}" 
         alt="{{ .Text }}" 
         {{ with .Title }} title="{{ . }}" {{ end }}
         loading="lazy" 
         style="max-width: 100%; height: auto; display: block; margin: 0 auto;">
  {{- else -}}
    <img src="{{ $srcFixed | relURL | safeURL }}" 
         alt="{{ .Text }}" 
         {{ with .Title }} title="{{ . }}" {{ end }}
         loading="lazy" 
         style="max-width: 100%; height: auto; display: block; margin: 0 auto;">
  {{- end -}}
  {{- with .Title -}}
    <figcaption style="font-style: italic; margin-top: 0.5rem;">
      {{- . | markdownify -}}
    </figcaption>
  {{- end -}}
</figure>
