<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="100%" height="auto" role="img" aria-labelledby="diagramTitle diagramDesc">
  <title id="diagramTitle">Myzeliale Netzwerke als Modell für eine Regenerative Ökonomie</title>
  <desc id="diagramDesc">Ein Diagramm, das die Prinzipien myzelialer Netzwerke und ihre Übertragung auf dezentrale, resiliente und ressourceneffiziente Wirtschaftssysteme darstellt.</desc>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

    /* Default (Light Mode) */
    :root {
      --bg: #F0F5F0;
      --text-primary: #2C3330;
      --text-secondary: #6B7A75;
      --line: #C5B388;
      --node-border: #2C3330;
      --node-fill: #F0F5F0;
      --arrow-fill: #C5B388;
      --font-family: 'JetBrains Mono', monospace;
      --font-size-large: 24px;
      --font-size-medium: 18px;
      --font-size-small: 14px;
    }

    /* Dark Mode */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0F1A15;
        --text-primary: #C5B388;
        --text-secondary: #A09070;
        --line: #2C3330;
        --node-border: #C5B388;
        --node-fill: #0F1A15;
        --arrow-fill: #2C3330;
      }
    }

    /* Mobile text resizing */
    @media (max-width: 600px) {
      :root {
        --font-size-large: 18px;
        --font-size-medium: 14px;
        --font-size-small: 10px;
      }
    }

    /* General styles for SVG container */
    .svg-container {
      max-width: 800px;
      height: auto;
      background-color: var(--bg);
      font-family: var(--font-family);
    }
    text {
      fill: var(--text-primary);
      font-size: var(--font-size-medium);
      text-anchor: middle;
      dominant-baseline: central;
      user-select: none;
    }
    .node-label {
      font-size: var(--font-size-medium);
      fill: var(--text-primary);
      font-weight: 700;
    }
    .sub-node-label {
      font-size: var(--font-size-small);
      fill: var(--text-secondary);
    }
    .main-node {
      stroke: var(--node-border);
      stroke-width: 2;
      fill: var(--node-fill);
      rx: 10; ry: 10;
    }
    .sub-node {
      stroke: var(--line);
      stroke-width: 1;
      fill: var(--node-fill);
      rx: 8; ry: 8;
    }
    .line {
      stroke: var(--line);
      stroke-width: 1.5;
      fill: none;
    }
    .arrowhead {
      fill: var(--arrow-fill);
    }
  </style>

  <rect width="100%" height="100%" fill="var(--bg)" class="svg-container"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" class="arrowhead" />
    </marker>
  </defs>

  <!-- Main Node: Mycelial Network Principles -->
  <rect id="mycelial-principles-node" x="350" y="50" width="300" height="60" class="main-node" />
  <text x="500" y="80" class="node-label">Mycelial Network Principles</text>

  <!-- Primary Branches (Mycelial Functions) -->
  <rect id="nutrient-exchange-node" x="100" y="200" width="200" height="50" class="sub-node" />
  <text x="200" y="225" class="sub-node-label">Nutrient Exchange</text>

  <rect id="communication-node" x="400" y="200" width="200" height="50" class="sub-node" />
  <text x="500" y="225" class="sub-node-label">Communication</text>

  <rect id="soil-restoration-node" x="700" y="200" width="200" height="50" class="sub-node" />
  <text x="800" y="225" class="sub-node-label">Soil Restoration</text>

  <!-- Lines from Main to Primary -->
  <path d="M500,110 C 450,140 300,170 200,200" class="line" marker-end="url(#arrow)" />
  <path d="M500,110 C 500,140 500,170 500,200" class="line" marker-end="url(#arrow)" />
  <path d="M500,110 C 550,140 700,170 800,200" class="line" marker-end="url(#arrow)" />

  <!-- Secondary Branches (Economic Translations) -->
  <rect id="collaborative-mgmt-node" x="50" y="350" width="250" height="50" class="main-node" />
  <text x="175" y="375" class="node-label">Collaborative Resource Mgmt</text>

  <rect id="distributed-governance-node" x="350" y="350" width="300" height="50" class="main-node" />
  <text x="500" y="375" class="node-label">Distributed Governance</text>

  <rect id="bio-logistics-node" x="690" y="350" width="220" height="50" class="main-node" />
  <text x="800" y="375" class="node-label">Bio-inspired Logistics</text>

  <!-- Lines from Primary to Secondary -->
  <path d="M200,250 C 200,280 175,310 175,350" class="line" marker-end="url(#arrow)" />
  <path d="M500,250 C 500,280 500,310 500,350" class="line" marker-end="url(#arrow)" />
  <path d="M800,250 C 800,280 800,310 800,350" class="line" marker-end="url(#arrow)" />

  <!-- Tertiary Branches (Emerging Applications/Outcomes) -->
  <rect id="carbon-seq-node" x="100" y="500" width="200" height="50" class="sub-node" />
  <text x="200" y="525" class="sub-node-label">Carbon Sequestration</text>

  <rect id="biomaterials-node" x="400" y="500" width="200" height="50" class="sub-node" />
  <text x="500" y="525" class="sub-node-label">Biomaterials</text>

  <rect id="circular-economy-node" x="700" y="500" width="200" height="50" class="main-node" />
  <text x="800" y="525" class="node-label">Circular Economy</text>

  <!-- Lines from Secondary to Tertiary -->
  <path d="M175,400 C 175,430 200,460 200,500" class="line" marker-end="url(#arrow)" />
  <path d="M500,400 C 500,430 500,460 500,500" class="line" marker-end="url(#arrow)" />
  <path d="M800,400 C 800,430 800,460 800,500" class="line" marker-end="url(#arrow)" />

  <!-- Final Outcome -->
  <rect id="life-aligned-economy-node" x="350" y="620" width="300" height="60" class="main-node" />
  <text x="500" y="650" class="node-label">Life-Aligned Economy</text>

  <!-- Lines from Tertiary to Final Outcome -->
  <path d="M200,550 C 200,580 400,600 400,620" class="line" marker-end="url(#arrow)" />
  <path d="M500,550 C 500,580 500,600 500,620" class="line" marker-end="url(#arrow)" />
  <path d="M800,550 C 800,580 600,600 600,620" class="line" marker-end="url(#arrow)" />
</svg>