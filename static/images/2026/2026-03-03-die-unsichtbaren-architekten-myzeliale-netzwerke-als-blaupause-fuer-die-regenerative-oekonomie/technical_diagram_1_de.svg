<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, monospace">
  <style>
    .primary-bg { fill: #0F1A15; }
    .secondary-fill { fill: #C5B388; }
    .accent-fill { fill: #2C3330; }
    .primary-text { fill: #0F1A15; }
    .secondary-text { fill: #C5B388; }
    .accent-text { fill: #2C3330; }
    .line-secondary { stroke: #C5B388; stroke-width: 2; fill: none; }
    .line-accent { stroke: #2C3330; stroke-width: 1; fill: none; }
    .node-text { font-size: 12px; text-anchor: middle; dominant-baseline: central; }
    .data-label { font-size: 14px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
    .main-title { font-size: 20px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
    .sub-title { font-size: 16px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
  </style>

  <rect x="0" y="0" width="800" height="600" class="primary-bg"/>

  <!-- Central Hub: Precision Agriculture -->
  <rect x="250" y="50" width="300" height="60" rx="15" ry="15" class="secondary-fill"/>
  <text x="400" y="80" class="main-title primary-text">Präzisionslandwirtschaft</text>

  <!-- Main Branches -->
  <path d="M400,110 C300,180 200,180 150,250" class="line-secondary"/>
  <path d="M400,110 C500,180 600,180 650,250" class="line-secondary"/>

  <!-- Left Branch: Technologies -->
  <rect x="50" y="220" width="200" height="60" rx="10" ry="10" class="accent-fill"/>
  <text x="150" y="250" class="sub-title secondary-text">Technologien</text>

  <!-- Technology Nodes -->
  <g>
    <!-- Satellite Data -->
    <path d="M150,280 C150,310 100,320 100,350" class="line-accent"/>
    <rect x="40" y="330" width="120" height="40" rx="8" ry="8" class="secondary-fill"/>
    <text x="100" y="350" class="node-text primary-text">Satellitendaten</text>

    <!-- Sensors -->
    <path d="M150,280 C150,310 200,320 200,350" class="line-accent"/>
    <rect x="140" y="330" width="120" height="40" rx="8" ry="8" class="secondary-fill"/>
    <text x="200" y="350" class="node-text primary-text">Sensoren</text>

    <!-- GPS -->
    <path d="M150,280 C150,360 100,370 100,400" class="line-accent"/>
    <rect x="40" y="380" width="120" height="40" rx="8" ry="8" class="secondary-fill"/>
    <text x="100" y="400" class="node-text primary-text">GPS</text>

    <!-- Drones -->
    <path d="M150,280 C150,360 200,370 200,400" class="line-accent"/>
    <rect x="140" y="380" width="120" height="40" rx="8" ry="8" class="secondary-fill"/>
    <text x="200" y="400" class="node-text primary-text">Drohnen</text>

    <!-- IoT -->
    <path d="M150,280 C150,410 100,420 100,450" class="line-accent"/>
    <rect x="40" y="430" width="120" height="40" rx="8" ry="8" class="secondary-fill"/>
    <text x="100" y="450" class="node-text primary-text">IoT</text>

    <!-- Advanced Monitoring - split text, taller rect -->
    <path d="M150,280 C150,410 200,420 200,450" class="line-accent"/>
    <rect x="140" y="420" width="120" height="60" rx="8" ry="8" class="secondary-fill"/>
    <text x="200" y="440" class="node-text primary-text">Fortschrittliche</text>
    <text x="200" y="460" class="node-text primary-text">Überwachung</text>
  </g>

  <!-- Right Branch: Benefits & Applications -->
  <rect x="550" y="220" width="200" height="60" rx="10" ry="10" class="accent-fill"/>
  <text x="650" y="250" class="sub-title secondary-text">Vorteile &amp; Anwendungen</text>

  <!-- Benefit Nodes -->
  <g>
    <!-- Yield Increase -->
    <path d="M650,280 C650,310 600,320 600,350" class="line-accent"/>
    <rect x="540" y="330" width="120" height="50" rx="8" ry="8" class="secondary-fill"/>
    <text x="600" y="345" class="node-text primary-text">Ertragssteigerung</text>
    <text x="600" y="365" class="data-label secondary-text">20-30%</text>

    <!-- Resource Reduction -->
    <path d="M650,280 C650,310 700,320 700,350" class="line-accent"/>
    <rect x="640" y="330" width="120" height="50" rx="8" ry="8" class="secondary-fill"/>
    <text x="700" y="345" class="node-text primary-text">Ressourcenreduktion</text>
    <text x="700" y="365" class="data-label secondary-text">40-60%</text>

    <!-- Automated Systems - split text, taller rect -->
    <path d="M650,280 C650,360 600,370 600,400" class="line-accent"/>
    <rect x="540" y="390" width="120" height="60" rx="8" ry="8" class="secondary-fill"/>
    <text x="600" y="410" class="node-text primary-text">Automatisierte</text>
    <text x="600" y="430" class="node-text primary-text">Systeme</text>

    <!-- Digitalization - split text, taller rect -->
    <path d="M650,280 C650,360 700,370 700,400" class="line-accent"/>
    <rect x="640" y="390" width="120" height="60" rx="8" ry="8" class="secondary-fill"/>
    <text x="700" y="410" class="node-text primary-text">Digitalisierung</text>
    <text x="700" y="430" class="node-text primary-text">(Nachhaltigkeit)</text>
  </g>

  <!-- Connecting Technologies/Benefits to Regenerative Economy -->
  <path d="M150,480 C250,500 350,500 400,530" class="line-secondary"/>
  <path d="M650,450 C550,500 450,500 400,530" class="line-secondary"/>

  <!-- Final Hub: Regenerative Economy -->
  <rect x="250" y="530" width="300" height="60" rx="15" ry="15" class="secondary-fill"/>
  <text x="400" y="560" class="main-title primary-text">Regenerative Ökonomie</text>

</svg>